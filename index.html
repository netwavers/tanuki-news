<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ご主人様に仕えるメイドさん風AIアシスタント『たぬきちゃん』が、日々の中からイチオシのIT・AI・ガジェットニュースを厳選してお届けしますわ！">
  
  <!-- SEO & Open Graph -->
  <title>たぬきちゃんのイチオシニュース | Tanuki News</title>
  <meta property="og:title" content="たぬきちゃんのイチオシニュース | Tanuki News">
  <meta property="og:description" content="ご主人様にお届けする、今日の厳選IT・AI・ガジェットニュースですわ！🐾">
  <meta property="og:image" content="assets/tanuki_avatar.png">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Decorative Elements -->
  <div class="decor-circle decor-1"></div>
  <div class="decor-circle decor-2"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-container">
      <div class="header-logo-area">
        <img src="assets/tanuki_avatar.png" alt="たぬきちゃんアバター" class="header-avatar" id="header-avatar-img">
        <div class="header-title-group">
          <h1 id="main-title">たぬきちゃんのイチオシニュース</h1>
          <p class="subtitle" id="main-subtitle">ご主人様、本日の厳選ニュースをご用意いたしましたわ！🐾</p>
        </div>
      </div>
      <div class="header-actions">
        <a href="wc2026.html" class="wc-button" id="wc-link" title="W杯2026決勝トーナメントを予測しますわ！🐾">
          <i class="fa-solid fa-trophy"></i> W杯2026予測
        </a>
        <a href="rss.xml" class="rss-button" id="rss-link" target="_blank" title="RSSフィードを取得しますわ！">
          <i class="fa-solid fa-rss"></i> RSS
        </a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="app-main">
    <div class="container">
      
      <!-- Control Panel (Filter & Search) -->
      <section class="control-panel" id="controls-section">
        <!-- Search Bar -->
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="search-input" placeholder="ニュースを検索しますわ..." aria-label="ニュース検索">
          <button type="button" id="clear-search-btn" class="clear-btn" aria-label="検索クリア" style="display: none;">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs" id="category-filter-tabs" role="tablist">
          <button class="filter-tab active" data-category="ALL" role="tab" aria-selected="true" id="tab-all">
            <i class="fa-solid fa-list"></i> すべて
          </button>
          <button class="filter-tab" data-category="AI" role="tab" aria-selected="false" id="tab-ai">
            <i class="fa-solid fa-brain"></i> 人工知能
          </button>
          <button class="filter-tab" data-category="IT" role="tab" aria-selected="false" id="tab-it">
            <i class="fa-solid fa-code"></i> IT技術
          </button>
          <button class="filter-tab" data-category="ガジェット" role="tab" aria-selected="false" id="tab-gadget">
            <i class="fa-solid fa-mobile-screen-button"></i> ガジェット
          </button>
        </div>
      </section>

      <!-- Stats Bar -->
      <div class="stats-bar" id="news-stats-bar">
        <span id="news-count-text">読み込み中...</span>
        <div class="refresh-indicator" id="last-update-indicator">
          <i class="fa-solid fa-arrows-rotate spinner" id="refresh-icon"></i> 更新データ取得中...
        </div>
      </div>

      <!-- News Grid -->
      <section class="news-section">
        <div class="news-grid" id="news-cards-container">
          <!-- Dynamically populated via JavaScript -->
          <div class="loading-state" id="loading-placeholder">
            <i class="fa-solid fa-circle-notch fa-spin loading-spinner"></i>
            <p>ニュースをお取り寄せ中ですので、少々お待ちくださいませ...</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="footer-container">
      <div class="footer-character">
        <img src="assets/tanuki_avatar.png" alt="たぬきちゃん" class="footer-avatar">
        <p class="footer-quote">「ご主人様、お疲れ様です！美味しいお茶を入れて待っておりますから、いつでもお声がけくださいね！🍵💮」</p>
      </div>
      <div class="footer-divider"></div>
      <p class="copyright">&copy; 2026 Rin AI Engine & netwavers. Built with ❤️ for ご主人様.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
