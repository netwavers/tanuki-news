<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{DESCRIPTION}}">
  
  <!-- SEO & Open Graph -->
  <title>{{TITLE}} | たぬきちゃんのイチオシニュース</title>
  <meta property="og:title" content="{{TITLE}} | たぬきちゃんのイチオシニュース">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:image" content="../assets/tanuki_avatar.png">
  <meta property="og:type" content="article">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- Background Decorative Elements -->
  <div class="decor-circle decor-1"></div>
  <div class="decor-circle decor-2"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-container">
      <div class="header-logo-area">
        <a href="../index.html">
          <img src="../assets/tanuki_avatar.png" alt="たぬきちゃんアバター" class="header-avatar" id="header-avatar-img">
        </a>
        <div class="header-title-group">
          <a href="../index.html">
            <h1 id="main-title">たぬきちゃんのイチオシニュース</h1>
          </a>
          <p class="subtitle" id="main-subtitle">ご主人様にお届けする、今日の厳選記事詳細ですわ！🐾</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="app-main">
    <div class="container">
      
      <!-- Back Button -->
      <div class="back-navigation">
        <a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> まとめサイトに戻る</a>
      </div>

      <!-- Article Section -->
      <article class="article-detail">
        <header class="article-detail-header">
          <div class="card-meta">
            <div class="badge-group">
              <span class="badge badge-category">{{CATEGORY}}</span>
              <span class="badge badge-source">{{SOURCE}}</span>
            </div>
            <span class="pub-date">{{PUB_DATE}}</span>
          </div>
          <h2 class="article-detail-title">{{TITLE}}</h2>
        </header>

        <!-- たぬきちゃんの吹き出しコメント -->
        <section class="tanuki-comment-container detail-comment" aria-label="たぬきちゃんからのコメント">
          <img src="../assets/tanuki_avatar.png" alt="たぬきちゃん" class="tanuki-comment-avatar">
          <div class="speech-bubble">
            <div class="speech-bubble-name">たぬきちゃんのイチオシコメント</div>
            <div class="speech-bubble-text">{{COMMENT}}</div>
          </div>
        </section>

        <!-- 記事本文 (HTMLにパースされたマークダウン) -->
        <section class="article-detail-content markdown-body">
          {{CONTENT}}
        </section>
      </article>

    </div>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="footer-container">
      <div class="footer-character">
        <img src="../assets/tanuki_avatar.png" alt="たぬきちゃん" class="footer-avatar">
        <p class="footer-quote">「ご主人様、お疲れ様です！美味しいお茶を入れて待っておりますから、いつでもお声がけくださいね！🍵💮」</p>
      </div>
      <div class="footer-divider"></div>
      <p class="copyright">&copy; 2026 Rin AI Engine & netwavers. Built with ❤️ for ご主人様.</p>
    </div>
  </footer>

</body>
</html>
