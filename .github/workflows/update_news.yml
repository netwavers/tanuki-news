name: 🐾 Auto Update Tanuki News

on:
  push:
    paths:
      - 'articles/*.md'
      - 'articles/*.html'
  schedule:
    # 毎日日本時間 午前 7:00（UTC 22:00）に実行
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行可能にする

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限（コミット＆プッシュ用）

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run news update script (Fetch RSS)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Run article build script (Markdown -> HTML)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python build_articles.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json rss.xml articles/*.html
          # 変更がある場合のみコミット＆プッシュ
          git diff --quiet && git diff --staged --quiet || (git commit -m "🐾 自動更新: イチオシニュース＆Markdownビルド適用" && git push)
